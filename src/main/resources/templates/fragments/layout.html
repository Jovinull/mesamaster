<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!--
  Fragmento: head
  Uso: <head th:replace="~{fragments/layout :: head('Titulo da Pagina')}">
-->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | MesaMaster'">MesaMaster</title>
    <!-- Bootstrap 5 CSS via CDN -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <!-- Bootstrap Icons via CDN -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- MesaMaster Design System -->
    <link rel="stylesheet" th:href="@{/css/mesamaster.css}">
</head>

<body>

<!--
  Fragmento: navbar
  Uso: <div th:replace="~{fragments/layout :: navbar}"></div>
-->
<nav th:fragment="navbar" class="navbar navbar-expand-lg mm-navbar">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-grid-3x3-gap-fill me-2"></i>MesaMaster
            <span class="mm-role-badge" sec:authorize="hasRole('GESTOR')">Gestor</span>
            <span class="mm-role-badge" sec:authorize="hasRole('GARCOM')">Garçom</span>
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item" sec:authorize="hasRole('GESTOR')">
                    <a class="nav-link" th:href="@{/gestor}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('GESTOR')">
                    <a class="nav-link" th:href="@{/gestor/mesas}">
                        <i class="bi bi-grid-3x3-gap me-1"></i>Mesas
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('GESTOR')">
                    <a class="nav-link" th:href="@{/gestor/produtos}">
                        <i class="bi bi-bag me-1"></i>Cardápio
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('GESTOR')">
                    <a class="nav-link" th:href="@{/gestor/usuarios}">
                        <i class="bi bi-people me-1"></i>Usuários
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('GESTOR')">
                    <a class="nav-link" th:href="@{/gestor/relatorio-curva-abc}">
                        <i class="bi bi-graph-up-arrow me-1"></i>Relatórios
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('GARCOM')">
                    <a class="nav-link" th:href="@{/garcom}">
                        <i class="bi bi-grid-3x3-gap me-1"></i>Mapa de Mesas
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Usuário</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Sair
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!--
  Fragmento: alerts
  Uso: <div th:replace="~{fragments/layout :: alerts}"></div>
-->
<div th:fragment="alerts" class="container mt-3">
    <div th:if="${not #strings.isEmpty(success)}"
         class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>
    <div th:if="${not #strings.isEmpty(erro)}"
         class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>
</div>

<!--
  Fragmento: scripts
  Uso: <div th:replace="~{fragments/layout :: scripts}"></div>
-->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFM2TbLMlAolSdQub0/B8rHhFxKe"
            crossorigin="anonymous"></script>
    <script th:src="@{/js/mesamaster.js}"></script>
</div>

</body>
</html>
