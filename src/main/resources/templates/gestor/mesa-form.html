<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nova Mesa')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">

            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0 fw-bold">
                        <i class="bi bi-plus-square me-2"></i>Nova Mesa
                    </h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/gestor/mesas/nova}" method="post">

                        <div class="mb-3">
                            <label for="numeroMesa" class="form-label fw-semibold">
                                Número da Mesa
                            </label>
                            <input type="number"
                                   id="numeroMesa"
                                   name="numeroMesa"
                                   class="form-control"
                                   min="1"
                                   placeholder="Ex: 1"
                                   required
                                   autofocus>
                            <div class="form-text">O status inicial será <strong>Livre</strong> automaticamente.</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-dark">
                                <i class="bi bi-floppy me-1"></i>Salvar Mesa
                            </button>
                            <a th:href="@{/gestor/mesas}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
