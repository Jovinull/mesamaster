<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">

    <div class="d-flex align-items-center mb-4">
        <h2 class="mb-0 fw-bold">
            <i class="bi bi-bar-chart-line me-2"></i>Dashboard Financeiro
        </h2>
    </div>

    <div class="row g-4">

        <div class="col-12 col-md-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body d-flex flex-column justify-content-between p-4">
                    <div class="d-flex align-items-center mb-3">
                        <span class="bg-primary bg-opacity-10 text-primary rounded-3 p-2 me-3">
                            <i class="bi bi-calendar-day fs-4"></i>
                        </span>
                        <span class="text-muted fw-semibold">Faturamento do Dia</span>
                    </div>
                    <p class="display-6 fw-bold text-dark mb-0"
                       th:text="'R$ ' + ${#numbers.formatDecimal(faturamentoDoDia, 1, 'POINT', 2, 'COMMA')}">
                        R$ 0,00
                    </p>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body d-flex flex-column justify-content-between p-4">
                    <div class="d-flex align-items-center mb-3">
                        <span class="bg-success bg-opacity-10 text-success rounded-3 p-2 me-3">
                            <i class="bi bi-calendar-week fs-4"></i>
                        </span>
                        <span class="text-muted fw-semibold">Últimos 7 Dias</span>
                    </div>
                    <p class="display-6 fw-bold text-dark mb-0"
                       th:text="'R$ ' + ${#numbers.formatDecimal(faturamentoUltimos7Dias, 1, 'POINT', 2, 'COMMA')}">
                        R$ 0,00
                    </p>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body d-flex flex-column justify-content-between p-4">
                    <div class="d-flex align-items-center mb-3">
                        <span class="bg-warning bg-opacity-10 text-warning rounded-3 p-2 me-3">
                            <i class="bi bi-calendar-month fs-4"></i>
                        </span>
                        <span class="text-muted fw-semibold">Mês Vigente</span>
                    </div>
                    <p class="display-6 fw-bold text-dark mb-0"
                       th:text="'R$ ' + ${#numbers.formatDecimal(faturamentoMesVigente, 1, 'POINT', 2, 'COMMA')}">
                        R$ 0,00
                    </p>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <a th:href="@{/gestor/mesas}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-grid-3x3-gap me-1"></i>Ir para Mesas
        </a>
        <a th:href="@{/gestor/produtos}" class="btn btn-outline-secondary btn-sm ms-2">
            <i class="bi bi-box-seam me-1"></i>Ir para Produtos
        </a>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
