<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">

    <div class="mm-page-header">
        <h2 class="page-title">
            <i class="bi bi-bar-chart-line"></i>Dashboard Financeiro
        </h2>
        <div class="d-flex gap-2">
            <a th:href="@{/gestor/relatorio-curva-abc}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-graph-up-arrow me-1"></i>Curva ABC
            </a>
        </div>
    </div>

    <div class="row g-4 mm-section">

        <div class="col-12 col-md-4">
            <div class="card stat-card h-100">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="mm-icon-wrap primary stat-icon-wrap">
                            <i class="bi bi-calendar-day"></i>
                        </div>
                        <span class="stat-label">Faturamento do Dia</span>
                    </div>
                    <div class="stat-value"
                         th:text="'R$ ' + ${#numbers.formatDecimal(faturamentoDoDia, 1, 'POINT', 2, 'COMMA')}">
                        R$ 0,00
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card stat-card h-100">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="mm-icon-wrap success stat-icon-wrap">
                            <i class="bi bi-calendar-week"></i>
                        </div>
                        <span class="stat-label">Últimos 7 Dias</span>
                    </div>
                    <div class="stat-value"
                         th:text="'R$ ' + ${#numbers.formatDecimal(faturamentoUltimos7Dias, 1, 'POINT', 2, 'COMMA')}">
                        R$ 0,00
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card stat-card h-100">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="mm-icon-wrap warning stat-icon-wrap">
                            <i class="bi bi-calendar-month"></i>
                        </div>
                        <span class="stat-label">Mês Vigente</span>
                    </div>
                    <div class="stat-value"
                         th:text="'R$ ' + ${#numbers.formatDecimal(faturamentoMesVigente, 1, 'POINT', 2, 'COMMA')}">
                        R$ 0,00
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="d-flex gap-2 flex-wrap">
        <a th:href="@{/gestor/mesas}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-grid-3x3-gap me-1"></i>Mesas
        </a>
        <a th:href="@{/gestor/produtos}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-bag me-1"></i>Cardápio
        </a>
        <a th:href="@{/gestor/usuarios}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-people me-1"></i>Usuários
        </a>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
