<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Usuários')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container py-4">

    <div class="mm-page-header">
        <h2 class="page-title">
            <i class="bi bi-people"></i>Usuários
        </h2>
        <a th:href="@{/gestor/usuarios/novo}" class="btn btn-dark">
            <i class="bi bi-plus-lg me-1"></i>Novo Usuário
        </a>
    </div>

    <div th:if="${usuarios.isEmpty()}" class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>
        Nenhum usuário cadastrado.
    </div>

    <div th:unless="${usuarios.isEmpty()}" class="card">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Login</th>
                        <th scope="col">Perfil</th>
                        <th scope="col" class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario, stat : ${usuarios}">
                        <td class="text-muted" th:text="${stat.count}">1</td>
                        <td class="fw-semibold" th:text="${usuario.nome}">Nome</td>
                        <td class="text-muted font-monospace" th:text="${usuario.login}">login</td>
                        <td>
                            <span th:if="${usuario.role.name() == 'GESTOR'}"
                                  class="badge bg-dark">
                                <i class="bi bi-shield-lock me-1"></i>Gestor
                            </span>
                            <span th:unless="${usuario.role.name() == 'GESTOR'}"
                                  class="badge bg-secondary">
                                <i class="bi bi-person-badge me-1"></i>Garçom
                            </span>
                        </td>
                        <td class="text-end">
                            <form th:action="@{/gestor/usuarios/{id}/excluir(id=${usuario.id})}"
                                  method="post"
                                  onsubmit="return confirm('Deseja excluir o usuário ' + this.dataset.nome + '?');"
                                  th:attr="data-nome=${usuario.nome}">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger"
                                        th:disabled="${usuario.login == #authentication.name}"
                                        th:title="${usuario.login == #authentication.name ? 'Você não pode excluir sua própria conta' : 'Excluir usuário'}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
