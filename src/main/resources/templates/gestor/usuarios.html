<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Usuários')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold">
            <i class="bi bi-people me-2"></i>Usuários
        </h2>
        <a th:href="@{/gestor/usuarios/novo}" class="btn btn-dark">
            <i class="bi bi-plus-lg me-1"></i>Novo Usuário
        </a>
    </div>

    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${usuarios.isEmpty()}" class="alert alert-info">
        Nenhum usuário cadastrado.
    </div>

    <div th:unless="${usuarios.isEmpty()}" class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Login</th>
                        <th scope="col">Perfil</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario, stat : ${usuarios}">
                        <td th:text="${stat.count}">1</td>
                        <td th:text="${usuario.nome}">Nome</td>
                        <td th:text="${usuario.login}">login</td>
                        <td>
                            <span th:if="${usuario.role.name() == 'GESTOR'}" class="badge bg-dark">
                                <i class="bi bi-shield-lock me-1"></i>Gestor
                            </span>
                            <span th:unless="${usuario.role.name() == 'GESTOR'}" class="badge bg-secondary">
                                <i class="bi bi-person-badge me-1"></i>Garçom
                            </span>
                        </td>
                        <td>
                            <form th:action="@{/gestor/usuarios/{id}/excluir(id=${usuario.id})}"
                                  method="post"
                                  onsubmit="return confirm('Deseja excluir este usuário?');">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger"
                                        th:disabled="${usuario.login == #authentication.name}"
                                        th:title="${usuario.login == #authentication.name ? 'Você não pode excluir sua própria conta' : 'Excluir'}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
