<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Produtos')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold">
            <i class="bi bi-bag me-2"></i>Cardápio
        </h2>
        <div>
            <a th:href="@{/gestor/relatorios/curva-abc}" class="btn btn-outline-primary me-2">
                <i class="bi bi-graph-up-arrow me-1"></i>Curva ABC
            </a>
            <a th:href="@{/gestor/produtos/novo}" class="btn btn-dark">
                <i class="bi bi-plus-lg me-1"></i>Novo Produto
            </a>
        </div>
    </div>

    <div th:if="${produtos.isEmpty()}" class="alert alert-info">
        Nenhum produto cadastrado. Clique em <strong>Novo Produto</strong> para começar.
    </div>

    <div th:unless="${produtos.isEmpty()}" class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Categoria</th>
                        <th scope="col">Preço</th>
                        <th scope="col">Ativo</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="produto, stat : ${produtos}">
                        <td th:text="${stat.count}">1</td>
                        <td th:text="${produto.nome}">Produto</td>
                        <td th:text="${produto.categoria}">Categoria</td>
                        <td th:text="'R$ ' + ${#numbers.formatDecimal(produto.precoVenda, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</td>
                        <td>
                            <span th:if="${produto.ativo}" class="badge bg-success">
                                <i class="bi bi-check-lg me-1"></i>Sim
                            </span>
                            <span th:unless="${produto.ativo}" class="badge bg-secondary">
                                <i class="bi bi-x-lg me-1"></i>Não
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
