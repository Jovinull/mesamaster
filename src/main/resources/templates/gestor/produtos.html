<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cardápio')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container py-4">

    <div class="mm-page-header">
        <h2 class="page-title">
            <i class="bi bi-bag"></i>Cardápio
        </h2>
        <a th:href="@{/gestor/produtos/novo}" class="btn btn-dark">
            <i class="bi bi-plus-lg me-1"></i>Novo Produto
        </a>
    </div>

    <div th:if="${produtos.isEmpty()}" class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>
        Nenhum produto cadastrado. Clique em <strong>Novo Produto</strong> para começar.
    </div>

    <div th:unless="${produtos.isEmpty()}" class="card">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Categoria</th>
                        <th scope="col">Preço</th>
                        <th scope="col">Disponível</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="produto, stat : ${produtos}">
                        <td class="text-muted" th:text="${stat.count}">1</td>
                        <td class="fw-semibold" th:text="${produto.nome}">Produto</td>
                        <td>
                            <span class="badge bg-secondary" th:text="${produto.categoria}">Categoria</span>
                        </td>
                        <td class="fw-semibold"
                            th:text="'R$ ' + ${#numbers.formatDecimal(produto.precoVenda, 1, 'POINT', 2, 'COMMA')}">
                            R$ 0,00
                        </td>
                        <td>
                            <span th:if="${produto.ativo}" class="status-badge livre">
                                <i class="bi bi-check-circle-fill"></i>Sim
                            </span>
                            <span th:unless="${produto.ativo}" class="status-badge ocupada">
                                <i class="bi bi-x-circle-fill"></i>Não
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
