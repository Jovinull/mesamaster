<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mesas')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold">
            <i class="bi bi-grid-3x3-gap me-2"></i>Mesas
        </h2>
        <a th:href="@{/gestor/mesas/nova}" class="btn btn-dark">
            <i class="bi bi-plus-lg me-1"></i>Nova Mesa
        </a>
    </div>

    <div th:if="${mesas.isEmpty()}" class="alert alert-info">
        Nenhuma mesa cadastrada. Clique em <strong>Nova Mesa</strong> para começar.
    </div>

    <div th:unless="${mesas.isEmpty()}" class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Número</th>
                        <th scope="col">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="mesa, stat : ${mesas}">
                        <td th:text="${stat.count}">1</td>
                        <td th:text="${mesa.numeroMesa}">1</td>
                        <td>
                            <span th:if="${mesa.status.name() == 'LIVRE'}"
                                  class="badge bg-success">
                                <i class="bi bi-check-circle me-1"></i>Livre
                            </span>
                            <span th:unless="${mesa.status.name() == 'LIVRE'}"
                                  class="badge bg-danger">
                                <i class="bi bi-x-circle me-1"></i>Ocupada
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
