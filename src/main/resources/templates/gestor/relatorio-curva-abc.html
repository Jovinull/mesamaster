<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Curva ABC')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold">
            <i class="bi bi-graph-up-arrow me-2"></i>Relatório Curva ABC
        </h2>
        <a th:href="@{/gestor}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Voltar
        </a>
    </div>

    <div th:if="${dados.isEmpty()}" class="alert alert-info">
        Nenhuma venda registrada em comandas fechadas para gerar o relatório.
    </div>

    <div th:unless="${dados.isEmpty()}" class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Posição</th>
                        <th scope="col">Produto</th>
                        <th scope="col" class="text-center">Qtd. Vendida</th>
                        <th scope="col" class="text-end">Total Gerado (R$)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item, stat : ${dados}">
                        <td th:text="${stat.count}" class="fw-bold">1</td>
                        <td th:text="${item.produtoNome}">Produto</td>
                        <td th:text="${item.quantidadeVendida}" class="text-center">0</td>
                        <td th:text="'R$ ' + ${#numbers.formatDecimal(item.totalGerado, 1, 'POINT', 2, 'COMMA')}" class="text-end">R$ 0,00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
