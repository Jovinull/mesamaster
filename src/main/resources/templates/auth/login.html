<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">

        <div class="card-header bg-dark text-white text-center py-4">
            <h4 class="mb-0 fw-bold">
                <i class="bi bi-table me-2"></i>MesaMaster
            </h4>
            <small class="text-secondary">Sistema de Gestão de Mesas</small>
        </div>

        <div class="card-body p-4">

            <!-- Mensagem de erro -->
            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span>Login ou senha inválidos. Tente novamente.</span>
            </div>

            <!-- Mensagem de logout -->
            <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span>Você saiu com sucesso.</span>
            </div>

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Login</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text"
                               id="username"
                               name="username"
                               class="form-control"
                               placeholder="Digite seu login"
                               autofocus
                               required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="Digite sua senha"
                               required>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-dark btn-lg">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
