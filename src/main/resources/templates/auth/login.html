<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>

<div class="mm-login-wrapper">
    <div class="card mm-login-card">

        <div class="mm-login-header">
            <div class="mm-login-logo-circle">
                <i class="bi bi-grid-3x3-gap-fill"></i>
            </div>
            <span class="mm-login-brand">MesaMaster</span>
            <span class="mm-login-sub">Sistema de Gestão de Mesas</span>
        </div>

        <div class="mm-login-body">

            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2 flex-shrink-0"></i>
                <span>Login ou senha inválidos. Tente novamente.</span>
            </div>

            <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2 flex-shrink-0"></i>
                <span>Você saiu com sucesso.</span>
            </div>

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label for="username" class="form-label">Login</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text"
                               id="username"
                               name="username"
                               class="form-control"
                               placeholder="Digite seu login"
                               autofocus
                               required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="Digite sua senha"
                               required>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-dark btn-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
