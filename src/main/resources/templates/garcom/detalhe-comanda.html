<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Detalhe da Comanda')}"></head>
<body data-role="garcom">

<div th:replace="~{fragments/layout :: navbar}"></div>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container py-4">

    <div class="mm-page-header">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/garcom/mesas/{id}(id=${comanda.mesa.id})}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Voltar
            </a>
            <h2 class="page-title mb-0">
                <i class="bi bi-receipt"></i>Comanda — Mesa <span th:text="${comanda.mesa.numeroMesa}">1</span>
            </h2>
        </div>
    </div>

    <!-- Aviso de comanda fechada -->
    <div th:if="${comanda.status.name() == 'FECHADA'}" class="alert alert-secondary d-flex align-items-center mb-4" role="alert">
        <i class="bi bi-lock-fill me-2 flex-shrink-0"></i>
        Esta comanda está <strong class="ms-1">fechada</strong>. Não é possível adicionar novos itens.
    </div>

    <!-- Lançar novo produto (somente quando ABERTA) -->
    <div th:if="${comanda.status.name() == 'ABERTA'}" class="card mb-4">
        <div class="card-header">
            <i class="bi bi-bag-plus me-2"></i>Lançar Produto
        </div>
        <div class="card-body">
            <form th:action="@{/garcom/comandas/{id}/lancar-produto(id=${comanda.id})}" method="post">
                <div class="row g-3 align-items-end">
                    <div class="col-md-6">
                        <label for="produtoId" class="form-label">Produto</label>
                        <select id="produtoId" name="produtoId" class="form-select" required>
                            <option value="">Selecione um produto...</option>
                            <option th:each="produto : ${produtos}"
                                    th:value="${produto.id}"
                                    th:text="${produto.nome + ' — R$ ' + #numbers.formatDecimal(produto.precoVenda, 1, 'COMMA', 2, 'POINT')}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="quantidade" class="form-label">Quantidade</label>
                        <input type="number" id="quantidade" name="quantidade"
                               class="form-control" min="1" value="1" required>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-plus-circle me-1"></i>Lançar
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Lista de itens pedidos -->
    <div class="card">
        <div class="card-header">
            <i class="bi bi-list-ul me-2"></i>Itens Pedidos
        </div>
        <div class="card-body p-0">
            <div th:if="${comanda.itens.isEmpty()}" class="p-4 text-center" style="color: var(--mm-text-muted);">
                <i class="bi bi-bag fs-3 d-block mb-2"></i>
                Nenhum item pedido ainda.
            </div>
            <div class="table-responsive" th:unless="${comanda.itens.isEmpty()}">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Produto</th>
                            <th class="text-center">Qtd</th>
                            <th class="text-end">Preço Unit.</th>
                            <th class="text-end">Subtotal</th>
                            <th class="text-end">Hora</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${comanda.itens}">
                            <td class="fw-semibold" th:text="${item.produto.nome}">Produto</td>
                            <td class="text-center" th:text="${item.quantidade}">1</td>
                            <td class="text-end"
                                th:text="'R$ ' + ${#numbers.formatDecimal(item.preco_unitario_na_hora, 1, 'COMMA', 2, 'POINT')}">
                                R$ 0,00
                            </td>
                            <td class="text-end fw-semibold"
                                th:text="'R$ ' + ${#numbers.formatDecimal(item.preco_unitario_na_hora.multiply(T(java.math.BigDecimal).valueOf(item.quantidade)), 1, 'COMMA', 2, 'POINT')}">
                                R$ 0,00
                            </td>
                            <td class="text-end" style="color: var(--mm-text-muted);"
                                th:text="${#temporals.format(item.hora_pedido, 'HH:mm')}">--</td>
                        </tr>
                    </tbody>
                    <tfoot class="table-light">
                        <tr>
                            <td colspan="3" class="fw-bold text-end">Total:</td>
                            <td class="fw-bold text-end"
                                style="font-size: 1.05rem;"
                                th:text="'R$ ' + ${#numbers.formatDecimal(comanda.total, 1, 'COMMA', 2, 'POINT')}">
                                R$ 0,00
                            </td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <!-- Botão Fechar Conta (somente quando ABERTA) -->
    <div th:if="${comanda.status.name() == 'ABERTA'}" class="mt-4 d-flex justify-content-end">
        <form th:action="@{/garcom/comandas/{id}/fechar(id=${comanda.id})}" method="post"
              data-no-loading
              onsubmit="return confirm('Confirmar fechamento da comanda?\nTotal: R$ ' + document.getElementById('totalFechamento').value + '\n\nEsta ação não pode ser desfeita.');">
            <input type="hidden" id="totalFechamento"
                   th:value="${#numbers.formatDecimal(comanda.total, 1, 'COMMA', 2, 'POINT')}">
            <button type="submit" class="btn btn-danger btn-lg">
                <i class="bi bi-x-circle me-2"></i>Fechar Conta
            </button>
        </form>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
