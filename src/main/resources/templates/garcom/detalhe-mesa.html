<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Detalhe da Mesa')}"></head>
<body data-role="garcom">

<div th:replace="~{fragments/layout :: navbar}"></div>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container py-4">

    <div class="mm-page-header">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/garcom/mesas}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Voltar
            </a>
            <h2 class="page-title mb-0">
                <i class="bi bi-grid-3x3-gap"></i>Mesa <span th:text="${mesa.numeroMesa}">1</span>
            </h2>
        </div>
        <form th:action="@{/garcom/mesas/{id}/nova-comanda(id=${mesa.id})}" method="post">
            <button type="submit" class="btn btn-dark">
                <i class="bi bi-plus-circle me-1"></i>Nova Comanda
            </button>
        </form>
    </div>

    <div th:if="${comandas.isEmpty()}" class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>
        Nenhuma comanda aberta para esta mesa.
    </div>

    <div th:unless="${comandas.isEmpty()}" class="row g-3">
        <div th:each="comanda, iterStat : ${comandas}" class="col-12 col-md-6 col-lg-4">
            <div class="card h-100">
                <div class="card-header">
                    <span class="fw-bold">
                        <i class="bi bi-receipt me-2"></i>Comanda <span th:text="${iterStat.index + 1}">1</span>
                    </span>
                </div>
                <div class="card-body">
                    <p class="mb-2 small" style="color: var(--mm-text-muted);">
                        <i class="bi bi-clock me-1"></i>Aberta em:
                        <span th:text="${#temporals.format(comanda.data_abertura, 'dd/MM/yyyy HH:mm')}">--</span>
                    </p>
                    <p class="fw-bold mb-3" style="font-size: 1.25rem; letter-spacing: -0.02em;">
                        R$ <span th:text="${#numbers.formatDecimal(comanda.total, 1, 2)}">0,00</span>
                    </p>
                    <a th:href="@{/garcom/comandas/{idComanda}(idComanda=${comanda.id})}"
                       class="btn btn-success w-100">
                        <i class="bi bi-bag-plus me-1"></i>Ver / Adicionar Pedidos
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
