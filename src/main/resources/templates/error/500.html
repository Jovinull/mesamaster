<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Erro Interno')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="display-1 fw-bold text-warning">500</h1>
            <h2 class="mb-3">Erro interno do servidor</h2>
            <p class="text-muted mb-1" th:if="${mensagem}" th:text="${mensagem}"></p>
            <p class="text-muted" th:unless="${mensagem}">Ocorreu um erro inesperado. Tente novamente em instantes.</p>
            <a th:href="@{/}" class="btn btn-dark mt-3">
                <i class="bi bi-house me-1"></i>Voltar ao início
            </a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
