<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Erro Interno')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="mm-error-page">
    <div class="text-center" style="max-width: 480px;">
        <div class="mm-error-code">500</div>
        <h2 class="fw-bold mt-3 mb-2">Erro interno do servidor</h2>
        <p class="mb-4" style="color: var(--mm-text-muted);" th:if="${mensagem}" th:text="${mensagem}"></p>
        <p class="mb-4" style="color: var(--mm-text-muted);" th:unless="${mensagem}">
            Ocorreu um erro inesperado. Tente novamente em instantes.
        </p>
        <a th:href="@{/}" class="btn btn-dark">
            <i class="bi bi-house me-2"></i>Voltar ao início
        </a>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
